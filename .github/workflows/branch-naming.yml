name: Branch Naming Rules
on: pull_request
jobs:
  branch-naming-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: deepakputhraya/action-branch-name@master
        with:
          regex: '([a-z])+\/([a-zA-Z0-9-])+'
          allowed_prefixes: 'feature,bugfix,hotfix,chore,docs'
          ignore: main,master
          min_length: 5
          max_length: 50
