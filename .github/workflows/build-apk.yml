name: Build Android APK

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Capacitor App
        run: |
          mkdir apk-wrapper
          cd apk-wrapper
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "qrvef" "com.itsrkmahapatra.qrvef" --web-dir www
          mkdir www
          echo "<html><body>Loading...</body></html>" > www/index.html
          echo '{ "appId": "com.itsrkmahapatra.qrvef", "appName": "qrvef", "webDir": "www", "server": { "url": "https://itsrkmahapatra.github.io/qrvef", "cleartext": true } }' > capacitor.config.json
          npx cap add android

      - name: Add App Icon
        run: |
          cd apk-wrapper
          npm install @capacitor/assets -D
          mkdir assets
          cp ../logo.png assets/icon.png
          cp ../logo.png assets/splash.png
          npx @capacitor/assets generate --android

      - name: Build Android APK
        run: |
          cd apk-wrapper/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv apk-wrapper/android/app/build/outputs/apk/debug/app-debug.apk qrvef.apk

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 qrvef.apk --clobber