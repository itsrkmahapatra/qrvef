name: Broken Link Checker
on:
  schedule:
    - cron: '0 0 1 * *' # Monthly
  workflow_dispatch:
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Link Checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --accept-200 --no-progress './**/*.md' './**/*.html'
