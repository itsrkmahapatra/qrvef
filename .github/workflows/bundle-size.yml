name: Bundle Size Guard
on: [pull_request]
jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check JS Size
        run: |
          size=$(find . -name "*.js" -not -path "*/node_modules/*" -exec cat {} + | wc -c)
          echo "Total JS Size: $size bytes"
          if [ $size -gt 5000000 ]; then echo "Bundle too large!"; exit 1; fi
