name: Lock Old Threads
on:
  schedule:
    - cron: '0 0 * * *'
jobs:
  lock:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: dessant/lock-threads@v6
        with:
          issue-inactive-days: '60'
          pr-inactive-days: '60'
