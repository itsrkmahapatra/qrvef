name: 'Community Assistant (Greetings)'
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "👋 Welcome to the project! Thank you for opening your first issue. A maintainer will review it shortly. Remember, this is a privacy-first, zero-installation tool."
          pr-message: "🎉 Welcome! Thank you for submitting your first pull request. We appreciate your contribution to making this tool better."
